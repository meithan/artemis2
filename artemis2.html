<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta property="og:title" content="Artemis 2 Visualizer" />
<meta property="og:description" content="A dashboard-style 3D visualization of Artemis 2 mission trajectory" />
<meta property="og:image" content="https://meithan.net/artemis2/preview.png" />
<meta property="og:url" content="https://meithan.net/artemis2" />
<meta property="og:type" content="website" />
<title>Artemis 2 Mission</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.32.0/plotly.min.js"></script>

<link rel="stylesheet" href="styles.css">

</head>

<body>
<div id="scanlines"></div>
<div id="app">

  <!-- Sidebar -->
  <aside id="sidebar">
    
    <div id="sidebar-header">
      <div class="mission-label">Artemis Moon Program</div>
      <div class="mission-name">ARTEMIS-2</div>
    </div>

    <div id="clock-block">
      <div class="section-label">Current Time</div>
      <div id="clock-display"></div>
      <div id="time-toggle-control">
        UTC <label class="toggle-switch square">
          <input id="time-format" type="checkbox">
          <span class="slider"></span>
        </label> Local
      </div>
    </div>    

    <div id="countdown-block">
      <div class="section-label">Mission Elapsed Time</div>
      <div id="countdown-display">T+00:00:00</div>
    </div>

    <div id="telemetry-block">
      <div class="section-label">Telemetry</div>
      <div class="telem-row">
        <span class="telem-key">ALTITUDE</span>
        <span class="telem-val" id="telem-alt">— km</span>
      </div>
      <div class="telem-row">
        <span class="telem-key">DIST MOON</span>
        <span class="telem-val" id="telem-moon">— km</span>
      </div>
      <div class="telem-row">
        <span class="telem-key">SPEED</span>
        <span class="telem-val" id="telem-speed">— km/s</span>
      </div>
      <div class="telem-row">
        <span class="telem-key">PHASE</span>
        <span class="telem-val" id="telem-phase">—</span>
      </div>
    </div>

    <div id="next-event-block">
      <div class="section-label">Next Event</div>
      <div id="next-event-pin"></div>
    </div>

    <div id="events-section">
      <div class="section-label" style="padding: 14px 20px 0">Mission Events</div>
      <div id="events-block">
        <div id="events-list"></div>
      </div>
    </div>

    <div id="notes-block">
      <div id="notes-div">Data from JPL Horizons • By meithan cc-by-sa</div>
    </div>

  </aside>

  <!-- Main -->
  <main id="main">
    <div id="plot"></div>
    <div id="controls">
      <span id="frame-label">Frame:</span>
      <select class="ctrl-btn" id="frame-select">
        <option value="FRAME_ECI" >ECI (ICRF)</option>
        <option value="FRAME_MOON_PLANE" selected>Moon orbit plane</option>
        <option value="FRAME_COROT_MEAN">Co-rotating, mean</option>
        <option value="FRAME_COROT_INST">Co-rotating, instant.</option>
        <!-- <option value="4">Co-rotting, fixed</option> -->
      </select>      
      <span id="speed-label">Time Rate:</span>
      <select class="ctrl-btn" id="speed-select">
        <option value="1" selected>1×</option>
        <option value="600">10m/s</option>
        <option value="3600">1h/s</option>
        <option value="36000">10h/s</option>        
      </select>
      <button class="ctrl-btn" id="btn-play">▶ PLAY</button>
      <button class="ctrl-btn" id="btn-live">⊙ LIVE</button>
      <input type="range" id="scrubber" min="0" max="10000" value="0">
    </div>
  </main>
</div>

<script src="artemis2.js"></script>

</body>
</html>
